apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gcp-dev-infra
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/stsewang17/platform-engineering.git
    targetRevision: HEAD
    path: argocd/infrastructure/gcp/dev
  destination:
    namespace: crossplane-system
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
